<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IANS – Boller</title>
  <meta name="description" content="Norwegian and Filipino buns and bakery favorites with detailed recipes." />
  <style>
    body{
      margin:0;
      font-family:Inter, Arial, sans-serif;
      background:linear-gradient(135deg,#07111f,#0b1628);
      color:white;
    }

    .container{
      max-width:1000px;
      margin:auto;
      padding:20px;
    }

    h1{
      font-size:2.5rem;
      margin-bottom:10px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      padding:20px;
      border-radius:20px;
      margin-top:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    button, .navbtn{
      margin:8px;
      padding:10px 16px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      text-decoration:none;
      display:inline-block;
      color:white;
    }

    .primary{background:#4fa3ff;color:white;}
    .secondary{background:#222;color:white;}
    .print{background:#28a745;color:white;}

    img{
      width:100%;
      max-height:420px;
      object-fit:cover;
      border-radius:15px;
      margin-bottom:14px;
      background:#111827;
    }

    h2{margin:8px 0}
    h3{margin-top:20px}
    p, li{line-height:1.6}
    ul, ol{padding-left:22px}

    .toplinks{
      margin-top:8px;
      margin-bottom:10px;
    }

    @media print{
      button, .navbtn, .toplinks{
        display:none !important;
      }
      body{
        background:#fff;
        color:#000;
      }
      .card{
        background:#fff;
        box-shadow:none;
        border:1px solid #ddd;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <h1>🥐 Boller Generator</h1>
  <p>Norwegian 🇳🇴 + Filipino 🇵🇭 bakery favorites</p>

  <div class="toplinks">
    <a class="navbtn secondary" href="index.html">⬅ Back</a>
    <a class="navbtn secondary" href="middag.html">🍽 Dinner</a>
    <a class="navbtn secondary" href="desser.html">🍰 Desserts</a>
  </div>

  <div class="card">
    <img id="image" alt="Boller image">
    <h2 id="title">Loading...</h2>
    <p id="desc"></p>

    <h3>⏱️ Time</h3>
    <p id="time"></p>

    <h3>🛒 Ingredients</h3>
    <ul id="ingredients"></ul>

    <h3>👨‍🍳 Instructions</h3>
    <ol id="instructions"></ol>

    <h3>📜 History</h3>
    <p id="history"></p>
  </div>

  <button class="primary" onclick="generate()">Generate boller</button>
  <button class="print" onclick="window.print()">Print</button>
  <button class="secondary" onclick="location.href='index.html'">Dashboard</button>

</div>

<script>
const boller = [

/* 🇳🇴 NORWAY */

{
title:"Hveteboller",
time:"About 2 hours incl. rising",
image:"https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=1400&q=80",
desc:"Classic Norwegian wheat buns. Soft, slightly sweet, and perfect with butter, jam, or just as they are.",
ingredients:[
  "950 g wheat flour",
  "150 g sugar",
  "1 tsp cardamom",
  "1/2 tsp salt",
  "150 g butter",
  "5 dl milk",
  "1 egg",
  "50 g fresh yeast or 1 packet dry yeast",
  "1 egg for brushing"
],
instructions:[
  "Warm the milk until lukewarm. Melt the butter and mix it into the milk.",
  "Add yeast and stir until dissolved if using fresh yeast.",
  "Mix flour, sugar, cardamom, and salt in a bowl.",
  "Add milk mixture and 1 egg. Knead for 10 minutes until smooth.",
  "Cover and let the dough rise for about 1 hour.",
  "Shape into buns and place on a baking tray.",
  "Let rise again for 30–40 minutes.",
  "Brush with beaten egg.",
  "Bake at 210°C for 10–12 minutes until golden."
],
history:"A classic Norwegian home-baked bun enjoyed for generations, often used as the base for many other sweet bun variations."
},

{
title:"Skillingsboller",
time:"About 2 hours incl. rising",
image:"https://images.unsplash.com/photo-1519915028121-7d3463d20b13?auto=format&fit=crop&w=1400&q=80",
desc:"Famous cinnamon buns from Bergen. Sweet, spiced, and very popular in Western Norway.",
ingredients:[
  "1 batch hvetebolle dough",
  "100 g soft butter",
  "1.5 dl sugar",
  "2 tbsp cinnamon",
  "Optional: pearl sugar on top"
],
instructions:[
  "Prepare one batch of sweet bun dough and let it rise once.",
  "Roll the dough into a large rectangle.",
  "Spread soft butter over the dough.",
  "Mix sugar and cinnamon, then sprinkle evenly over the butter.",
  "Roll the dough tightly into a log.",
  "Cut into slices about 2–3 cm thick.",
  "Place on baking trays and let rise for 30 minutes.",
  "Bake at 210°C for 10–12 minutes.",
  "Optional: top with pearl sugar before baking."
],
history:"A bakery favorite from Bergen, especially associated with local café culture and traditional Norwegian sweet baking."
},

{
title:"Fastelavnsboller",
time:"About 2 hours + filling",
image:"https://images.unsplash.com/photo-1551024709-8f23befc6f87?auto=format&fit=crop&w=1400&q=80",
desc:"Soft cardamom buns filled with whipped cream and jam, usually made for Fastelavn.",
ingredients:[
  "10 plain hveteboller",
  "3 dl whipping cream",
  "2 tbsp sugar",
  "1 tsp vanilla sugar",
  "Strawberry or raspberry jam",
  "Icing sugar for dusting"
],
instructions:[
  "Bake or prepare plain buns and let them cool fully.",
  "Whip the cream with sugar and vanilla sugar until soft and fluffy.",
  "Cut the tops off the buns.",
  "Add 1 spoon of jam inside each bun.",
  "Pipe or spoon whipped cream over the jam.",
  "Place the top back on.",
  "Dust with icing sugar before serving."
],
history:"A seasonal bun linked to Fastelavn in Norway and other Nordic countries."
},

{
title:"Rosinboller",
time:"About 2 hours incl. rising",
image:"https://images.unsplash.com/photo-1482049016688-2d3e1b311543?auto=format&fit=crop&w=1400&q=80",
desc:"Soft sweet buns with raisins, very common in Norwegian home baking.",
ingredients:[
  "1 batch hvetebolle dough",
  "150 g raisins"
],
instructions:[
  "Prepare the sweet bun dough.",
  "Add raisins during the last part of kneading.",
  "Let the dough rise for about 1 hour.",
  "Shape into buns.",
  "Let rise again for 30–40 minutes.",
  "Brush with egg.",
  "Bake at 210°C for 10–12 minutes."
],
history:"A classic family bun that has long been common in Norwegian homes, school events, and bake sales."
},

{
title:"Skoleboller",
time:"About 2 hours incl. rising",
image:"https://images.unsplash.com/photo-1601972599720-36938d4ecd31?auto=format&fit=crop&w=1400&q=80",
desc:"Soft buns with vanilla custard in the middle, decorated with icing and coconut.",
ingredients:[
  "1 batch hvetebolle dough",
  "3 dl vanilla custard",
  "2 dl icing sugar",
  "1–2 tbsp water",
  "1 dl desiccated coconut"
],
instructions:[
  "Prepare the sweet bun dough and let it rise once.",
  "Shape into round buns and place on baking trays.",
  "Press a dip in the center of each bun.",
  "Fill the center with vanilla custard.",
  "Let rise again for about 30 minutes.",
  "Bake at 210°C for 10–12 minutes.",
  "Mix icing sugar and a little water into thick icing.",
  "Spread icing in a ring around the custard and dip into coconut."
],
history:"A very popular Norwegian bakery bun, often associated with school cafeterias and local bakeries."
},

/* 🇵🇭 PHILIPPINES */

{
title:"Pandesal",
time:"About 2 hours incl. rising",
image:"https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=1400&q=80",
desc:"The most iconic Filipino bread roll. Lightly sweet, soft, and usually eaten for breakfast or merienda.",
ingredients:[
  "750 g all-purpose flour",
  "90 g sugar",
  "1 tsp salt",
  "1 packet dry yeast",
  "3.5 dl warm milk",
  "1 dl warm water",
  "60 g melted butter",
  "1 egg",
  "1 dl breadcrumbs for coating"
],
instructions:[
  "Mix warm milk, warm water, sugar, and yeast. Let sit for 5–10 minutes.",
  "Add egg and melted butter.",
  "Mix in flour and salt gradually.",
  "Knead for 8–10 minutes until smooth.",
  "Let the dough rise for 1 hour.",
  "Divide and shape into small rolls.",
  "Roll lightly in breadcrumbs.",
  "Let rise again for 30 minutes.",
  "Bake at 180°C for 12–15 minutes until lightly golden."
],
history:"Pandesal developed under Spanish-era baking influence and became one of the most common breads in the Philippines."
},

{
title:"Ensaymada",
time:"About 2.5 hours",
image:"https://images.unsplash.com/photo-1605478522626-3e6e2c8a8b7f?auto=format&fit=crop&w=1400&q=80",
desc:"Soft, rich Filipino buns topped with butter, sugar, and cheese.",
ingredients:[
  "800 g flour",
  "100 g sugar",
  "1 tsp salt",
  "1 packet dry yeast",
  "2.5 dl warm milk",
  "4 egg yolks",
  "120 g soft butter",
  "Extra butter for topping",
  "Sugar for topping",
  "Grated cheese for topping"
],
instructions:[
  "Mix warm milk and yeast and let it activate.",
  "Add egg yolks, sugar, and soft butter.",
  "Mix in flour and salt.",
  "Knead until soft and elastic.",
  "Let rise for 1 hour.",
  "Shape into coils or round buns in molds if you have them.",
  "Let rise again for 30–40 minutes.",
  "Bake at 180°C for 12–15 minutes.",
  "Cool slightly, then top with butter, sugar, and grated cheese."
],
history:"Ensaymada reflects Spanish baking influence adapted into a beloved Filipino sweet bun tradition."
},

{
title:"Spanish Bread",
time:"About 2 hours",
image:"https://images.unsplash.com/photo-1627308595180-8b30d8a1c7b5?auto=format&fit=crop&w=1400&q=80",
desc:"Sweet bread rolls filled with buttery breadcrumb filling, a favorite in Filipino bakeries.",
ingredients:[
  "1 batch sweet dough",
  "100 g breadcrumbs",
  "80 g butter",
  "1 dl brown sugar",
  "1 tsp vanilla"
],
instructions:[
  "Prepare a soft sweet dough and let it rise once.",
  "Make filling by cooking breadcrumbs, butter, sugar, and vanilla together briefly.",
  "Divide dough into small pieces and roll each flat.",
  "Add filling and roll into logs.",
  "Let rise again for 30 minutes.",
  "Bake at 180°C for 12–15 minutes."
],
history:"Despite the name, this is a localized Filipino bakery favorite rather than a Spanish everyday bread."
},

{
title:"Cheese Bread",
time:"About 2 hours",
image:"https://images.unsplash.com/photo-1625944525643-5b8df6f1d233?auto=format&fit=crop&w=1400&q=80",
desc:"Soft sweet bread with a cheesy, buttery flavor, often sold in Filipino bakeries.",
ingredients:[
  "750 g flour",
  "90 g sugar",
  "1 packet dry yeast",
  "3 dl milk",
  "60 g butter",
  "1 egg",
  "100 g grated cheese",
  "Extra butter and sugar for topping"
],
instructions:[
  "Mix warm milk, sugar, and yeast.",
  "Add egg and butter.",
  "Work in flour until a soft dough forms.",
  "Knead until smooth.",
  "Let rise for 1 hour.",
  "Shape into rolls or small loaves.",
  "Let rise again for 30 minutes.",
  "Bake at 180°C for 12–15 minutes.",
  "Brush with butter and top with sugar and cheese if desired."
],
history:"A modern Filipino bakery classic that combines sweet bread with the local love of cheese-topped buns."
},

{
title:"Ube Cheese Pandesal",
time:"About 2.5 hours",
image:"https://images.unsplash.com/photo-1589302168068-964664d93dc0?auto=format&fit=crop&w=1400&q=80",
desc:"Soft purple yam bread rolls with a cheesy filling, very popular in modern Filipino bakeries.",
ingredients:[
  "750 g flour",
  "100 g sugar",
  "1 packet dry yeast",
  "3 dl warm milk",
  "60 g butter",
  "1 egg",
  "150 g ube halaya or ube flavoring",
  "150 g cheese cubes",
  "Breadcrumbs for coating"
],
instructions:[
  "Mix warm milk, sugar, and yeast and let sit for 5–10 minutes.",
  "Add egg, butter, and ube.",
  "Mix in flour until a soft dough forms.",
  "Knead until smooth and elastic.",
  "Let rise for 1 hour.",
  "Divide dough, flatten each piece, and place a cheese cube inside.",
  "Shape into rolls and coat lightly in breadcrumbs.",
  "Let rise again for 30 minutes.",
  "Bake at 180°C for 12–15 minutes."
],
history:"A newer bakery trend that combines classic pandesal with the Filipino love of ube and cheese."
}

];

function fallbackImage(title){
  return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700">
      <defs>
        <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
          <stop stop-color="#07111f" offset="0"/>
          <stop stop-color="#0b1628" offset="1"/>
        </linearGradient>
      </defs>
      <rect width="100%" height="100%" fill="url(#g)"/>
      <text x="50%" y="42%" text-anchor="middle" fill="#ffffff" font-size="86" font-family="Arial">🥐</text>
      <text x="50%" y="56%" text-anchor="middle" fill="#dbeafe" font-size="34" font-family="Arial">${title}</text>
      <text x="50%" y="64%" text-anchor="middle" fill="#93a7c7" font-size="22" font-family="Arial">Image placeholder</text>
    </svg>
  `)}`;
}

function generate(){
  const d = boller[Math.floor(Math.random()*boller.length)];

  document.getElementById("title").textContent = d.title;
  document.getElementById("desc").textContent = d.desc;
  document.getElementById("time").textContent = d.time;

  const img = document.getElementById("image");
  img.onerror = () => { img.src = fallbackImage(d.title); };
  img.src = d.image;

  document.getElementById("ingredients").innerHTML =
    d.ingredients.map(i=>`<li>${i}</li>`).join("");

  document.getElementById("instructions").innerHTML =
    d.instructions.map(i=>`<li>${i}</li>`).join("");

  document.getElementById("history").textContent = d.history;
}

generate();
</script>

</body>
</html>
