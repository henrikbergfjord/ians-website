<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IANS – Kalender</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: linear-gradient(135deg, #0b1220, #0f1b3a);
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-weight: 600;
      font-size: 18px;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #cbd5e1;
      padding: 8px 14px;
      border-radius: 10px;
    }

    nav a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .btn {
      background: linear-gradient(135deg, #6ea8ff, #8b5cf6);
      padding: 10px 16px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-weight: 500;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .calendar-box {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      background: #111827;
    }

    iframe {
      width: 100%;
      height: 800px;
      border: none;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">📅 IANS</div>

  <nav>
    <a href="/">Forside</a>
    <a href="/kalender.html" class="active">Kalender</a>
  </nav>

  <a href="/" class="btn">Til forsiden</a>
</header>

<div class="container">
  <h1>Familiekalender</h1>
  <p>Alle avtaler oppdateres automatisk fra Google Calendar.</p>

  <div class="calendar-box">
    <iframe src="https://calendar.google.com/calendar/embed?src=c_dcka70q9qgpskub2e84t57qj5g%40group.calendar.google.com&ctz=Europe%2FOslo"></iframe>
  </div>
</div>

</body>
</html>
