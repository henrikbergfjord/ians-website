<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinner Generator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    margin: 0;
    padding: 0;
    text-align: center;
}

.container {
    max-width: 800px;
    margin: 50px auto;
    padding: 20px;
}

h1 {
    font-size: 2.5em;
}

.card {
    background: #1e293b;
    border-radius: 15px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    color: black;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

</style>
</head>

<body>

<div class="container">
    <h1>🍽️ Dinner Generator</h1>
    <p>Get a random Norwegian or Filipino dinner idea!</p>

    <div class="card">
        <h2 id="dish">Click the button 🍳</h2>
        <p id="description"></p>
        <h3>Ingredients</h3>
        <p id="ingredients"></p>
        <h3>Instructions</h3>
        <p id="instructions"></p>
    </div>

    <button onclick="generateDinner()">Generate New Dinner</button>
</div>

<script>

const dinners = [
{
    name: "Fårikål (Norwegian Lamb Stew)",
    description: "Norway’s national dish. Simple, rustic, and full of flavor.",
    ingredients: "Lamb, cabbage, pepper, salt, water",
    instructions: "Layer lamb and cabbage in a pot, add water and pepper. Simmer for 2-3 hours."
},
{
    name: "Kjøttkaker (Norwegian Meatballs)",
    description: "Classic Norwegian comfort food with brown sauce.",
    ingredients: "Ground beef, onion, milk, flour, salt, pepper",
    instructions: "Mix ingredients, form balls, fry, and serve with brown sauce and potatoes."
},
{
    name: "Adobo (Filipino)",
    description: "One of the most famous Filipino dishes.",
    ingredients: "Chicken/pork, soy sauce, vinegar, garlic, bay leaves",
    instructions: "Marinate meat, then simmer in sauce until tender."
},
{
    name: "Sinigang (Filipino Sour Soup)",
    description: "A delicious sour soup with tamarind flavor.",
    ingredients: "Pork, tamarind mix, vegetables, fish sauce",
    instructions: "Boil meat, add vegetables and souring agent, simmer."
},
{
    name: "Pancit (Filipino Noodles)",
    description: "A festive noodle dish symbolizing long life.",
    ingredients: "Noodles, chicken, vegetables, soy sauce",
    instructions: "Stir-fry everything together and season well."
},
{
    name: "Lapskaus (Norwegian Stew)",
    description: "Hearty Norwegian stew perfect for cold days.",
    ingredients: "Potatoes, carrots, meat, onion",
    instructions: "Cook everything together until soft and thick."
}
];

function generateDinner() {
    const random = dinners[Math.floor(Math.random() * dinners.length)];

    document.getElementById("dish").innerText = random.name;
    document.getElementById("description").innerText = random.description;
    document.getElementById("ingredients").innerText = random.ingredients;
    document.getElementById("instructions").innerText = random.instructions;
}

</script>

</body>
</html>
