<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    body{
      margin:0;
      font-family:Inter, sans-serif;
      background:linear-gradient(135deg,#0b1628,#07111f);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      text-align:center;
    }

    .container{
      max-width:800px;
      padding:20px;
    }

    h1{
      font-size:2.5rem;
      margin-bottom:10px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      padding:25px;
      border-radius:20px;
      margin-top:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    button{
      margin:10px;
      padding:12px 20px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
      font-size:1rem;
    }

    .primary{
      background:#4fa3ff;
      color:white;
    }

    .secondary{
      background:#222;
      color:white;
    }

    .print{
      background:#28a745;
      color:white;
    }

    h2{margin-top:10px}
    p{line-height:1.5}
  </style>
</head>

<body>

<div class="container">

  <h1>🍽️ Dinner Generator</h1>
  <p>Norwegian 🇳🇴 + Filipino 🇵🇭 dinner inspiration</p>

  <div class="card" id="mealCard">

    <p id="desc"></p>

    <h3>Ingredients</h3>
    <p id="ingredients"></p>

    <h3>Instructions</h3>
    <p id="instructions"></p>

    <h3>History</h3>
    <p id="history"></p>
  </div>

  <button class="primary" onclick="generateMeal()">Generate New Dinner</button>
  <button class="print" onclick="window.print()">🖨️ Print</button>
  <button class="secondary" onclick="window.location.href='index.html'">⬅ Back</button>

</div>
